name: iOS CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint

      - name: Run Unit + Integration Tests
        run: |
          xcodebuild test \
            -project ClientApp.xcodeproj \
            -scheme ClientApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'
