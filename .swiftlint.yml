included:
  - App
  - Models
  - Services
  - Features
  - Tests

excluded:
  - Carthage
  - Pods
  - .build
  - DerivedData

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
  - implicitly_unwrapped_optional
  - redundant_nil_coalescing
  - sorted_imports
  - weak_delegate

line_length:
  warning: 140
  error: 180
  ignores_comments: true

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 220
  error: 300

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - z

reporter: "xcode"
